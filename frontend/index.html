<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Assistant — Ask Your Documents</title>
  <meta name="description" content="Upload PDFs or text files and ask questions powered by AI retrieval-augmented generation." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ===== Reset & Variables ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0b0f19;
      --surface:   #111827;
      --surface2:  #1e293b;
      --surface3:  #263146;
      --border:    #1e293b;
      --text:      #e2e8f0;
      --text-dim:  #94a3b8;
      --accent:    #6366f1;
      --accent-h:  #818cf8;
      --accent-g1: #6366f1;
      --accent-g2: #a855f7;
      --green:     #34d399;
      --red:       #f87171;
      --radius:    12px;
      --font:      'Inter', system-ui, -apple-system, sans-serif;
    }
    html { font-size: 15px; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

    /* ===== Header ===== */
    header {
      text-align: center;
      padding: 2.5rem 1rem 1.8rem;
      background: linear-gradient(180deg, rgba(99,102,241,.12) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-g1), var(--accent-g2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }
    header p {
      color: var(--text-dim);
      margin-top: .45rem;
      font-size: .95rem;
    }

    /* ===== Layout ===== */
    .app {
      display: flex;
      flex: 1;
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
      gap: 0;
    }
    .sidebar {
      width: 340px;
      min-width: 300px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 1.6rem;
      gap: 1.4rem;
      overflow-y: auto;
      max-height: calc(100vh - 110px);
    }
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 110px);
    }

    /* ===== Section titles ===== */
    .section-title {
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-dim);
      margin-bottom: .4rem;
    }

    /* ===== Upload Area ===== */
    .upload-zone {
      border: 2px dashed var(--surface3);
      border-radius: var(--radius);
      padding: 1.6rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .25s, background .25s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: rgba(99,102,241,.06);
    }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }
    .upload-icon {
      font-size: 2rem;
      margin-bottom: .5rem;
    }
    .upload-zone p { color: var(--text-dim); font-size: .85rem; }
    .upload-zone .hint { font-size: .72rem; color: var(--text-dim); margin-top: .3rem; }

    /* ===== Button ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .45rem;
      padding: .6rem 1.25rem;
      border: none;
      border-radius: 8px;
      font-family: var(--font);
      font-weight: 600;
      font-size: .85rem;
      cursor: pointer;
      transition: transform .15s, box-shadow .2s, opacity .2s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-g1), var(--accent-g2));
      color: #fff;
      box-shadow: 0 2px 12px rgba(99,102,241,.35);
    }
    .btn-primary:hover { box-shadow: 0 4px 20px rgba(99,102,241,.5); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    /* ===== Status Message ===== */
    .status {
      font-size: .82rem;
      padding: .55rem .75rem;
      border-radius: 8px;
      display: none;
      align-items: center;
      gap: .4rem;
      animation: fadeIn .3s ease;
    }
    .status.success { display: flex; background: rgba(52,211,153,.1); color: var(--green); }
    .status.error   { display: flex; background: rgba(248,113,113,.1); color: var(--red); }
    .status.loading { display: flex; background: rgba(99,102,241,.1); color: var(--accent-h); }

    /* ===== File List ===== */
    .file-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: .35rem;
    }
    .file-list li {
      font-size: .82rem;
      padding: .5rem .7rem;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: .45rem;
      color: var(--text);
      animation: slideIn .3s ease;
    }
    .file-list li .icon { opacity: .55; }

    /* ===== Chat Messages ===== */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.6rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .message {
      max-width: 78%;
      padding: .85rem 1.1rem;
      border-radius: 16px;
      font-size: .9rem;
      line-height: 1.55;
      animation: fadeIn .3s ease;
      word-wrap: break-word;
    }
    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent-g1), var(--accent-g2));
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.bot {
      align-self: flex-start;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .message .sources {
      margin-top: .55rem;
      font-size: .72rem;
      color: var(--text-dim);
      border-top: 1px solid var(--surface3);
      padding-top: .4rem;
    }
    .message .sources strong { color: var(--accent-h); }

    /* ===== Welcome ===== */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      opacity: .45;
      text-align: center;
      padding: 2rem;
    }
    .welcome .emoji { font-size: 3rem; }
    .welcome p { font-size: .92rem; color: var(--text-dim); }

    /* ===== Chat Input ===== */
    .chat-input-bar {
      padding: 1rem 1.6rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: .6rem;
      background: var(--surface);
    }
    .chat-input-bar input {
      flex: 1;
      padding: .7rem 1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
    }
    .chat-input-bar input::placeholder { color: var(--text-dim); }
    .chat-input-bar input:focus { border-color: var(--accent); }

    /* ===== Spinner ===== */
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid var(--surface3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block;
    }

    /* ===== Keyframes ===== */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .app { flex-direction: column; }
      .sidebar { width: 100%; max-height: none; border-right: none; border-bottom: 1px solid var(--border); }
      .chat-area { max-height: 60vh; }
      header h1 { font-size: 1.7rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>RAG Assistant</h1>
    <p>Ask questions from your documents</p>
  </header>

  <div class="app">
    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div>
        <div class="section-title">Upload Documents</div>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" accept=".pdf,.txt" />
          <div class="upload-icon">📄</div>
          <p>Drag &amp; drop or click to select</p>
          <div class="hint">Supports PDF &amp; TXT files</div>
        </div>
        <div style="margin-top:.7rem; text-align:center;">
          <button class="btn btn-primary" id="uploadBtn" disabled>
            <span id="uploadBtnText">Upload</span>
          </button>
        </div>
        <div class="status" id="uploadStatus"></div>
      </div>

      <div>
        <div class="section-title">Uploaded Files</div>
        <ul class="file-list" id="fileList">
          <!-- populated dynamically -->
        </ul>
        <p id="noFiles" style="font-size:.8rem; color:var(--text-dim);">No files uploaded yet.</p>
      </div>
    </aside>

    <!-- ── Chat ── -->
    <section class="chat-area">
      <div class="chat-messages" id="chatMessages">
        <div class="welcome" id="welcomeMsg">
          <div class="emoji">💬</div>
          <p>Upload a document and start asking questions!</p>
        </div>
      </div>

      <div class="chat-input-bar">
        <input type="text" id="questionInput" placeholder="Ask a question about your documents…" autocomplete="off" />
        <button class="btn btn-primary" id="sendBtn">Send</button>
      </div>
    </section>
  </div>

  <script>
    // ───── DOM refs ─────
    const fileInput     = document.getElementById('fileInput');
    const uploadZone    = document.getElementById('uploadZone');
    const uploadBtn     = document.getElementById('uploadBtn');
    const uploadBtnText = document.getElementById('uploadBtnText');
    const uploadStatus  = document.getElementById('uploadStatus');
    const fileList      = document.getElementById('fileList');
    const noFiles       = document.getElementById('noFiles');
    const chatMessages  = document.getElementById('chatMessages');
    const welcomeMsg    = document.getElementById('welcomeMsg');
    const questionInput = document.getElementById('questionInput');
    const sendBtn       = document.getElementById('sendBtn');

    let selectedFile = null;

    // ───── Upload zone interactions ─────
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length) {
        selectedFile = e.target.files[0];
        uploadBtn.disabled = false;
        setStatus('loading', `Selected: ${selectedFile.name}`);
      }
    });
    uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      if (e.dataTransfer.files.length) {
        selectedFile = e.dataTransfer.files[0];
        fileInput.files = e.dataTransfer.files;
        uploadBtn.disabled = false;
        setStatus('loading', `Selected: ${selectedFile.name}`);
      }
    });

    // ───── Upload ─────
    uploadBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      uploadBtn.disabled = true;
      uploadBtnText.textContent = 'Uploading…';
      setStatus('loading', `Uploading ${selectedFile.name}…`);

      const formData = new FormData();
      formData.append('file', selectedFile);

      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Upload failed');
        setStatus('success', data.message);
        addFileToList(data.filename);
      } catch (err) {
        setStatus('error', err.message);
      } finally {
        uploadBtnText.textContent = 'Upload';
        uploadBtn.disabled = false;
        selectedFile = null;
        fileInput.value = '';
      }
    });

    // ───── Ask question ─────
    sendBtn.addEventListener('click', askQuestion);
    questionInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') askQuestion(); });

    async function askQuestion() {
      const q = questionInput.value.trim();
      if (!q) return;
      questionInput.value = '';
      welcomeMsg.style.display = 'none';

      appendMessage('user', q);
      const loadingEl = appendMessage('bot', '<div class="spinner"></div>');

      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Request failed');

        let html = escapeHtml(data.answer).replace(/\n/g, '<br>');
        if (data.sources && data.sources.length) {
          html += `<div class="sources"><strong>Sources:</strong> ${data.sources.map(escapeHtml).join(', ')}</div>`;
        }
        loadingEl.innerHTML = html;
      } catch (err) {
        loadingEl.innerHTML = `<span style="color:var(--red);">⚠ ${escapeHtml(err.message)}</span>`;
      }
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // ───── Helper functions ─────
    function setStatus(type, msg) {
      uploadStatus.className = 'status ' + type;
      uploadStatus.textContent = msg;
    }

    function addFileToList(name) {
      noFiles.style.display = 'none';
      // avoid duplicates
      for (const li of fileList.children) {
        if (li.dataset.name === name) return;
      }
      const li = document.createElement('li');
      li.dataset.name = name;
      li.innerHTML = `<span class="icon">📎</span> ${escapeHtml(name)}`;
      fileList.appendChild(li);
    }

    function appendMessage(role, content) {
      const div = document.createElement('div');
      div.className = 'message ' + role;
      div.innerHTML = role === 'user' ? escapeHtml(content) : content;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return div;
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }
  </script>
</body>
</html>
